# Triggered on push to master; runs CI gates, then either opens a "Release
# packages" PR (when there are pending changesets) or publishes to npm
# (when the version PR was just merged). Requires secrets.NPM_TOKEN.
name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'hacker-cb/1c-odata'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        run: pnpm install --frozen-lockfile
      # CI gates split into separate turbo invocations (mirrors ci.yml).
      # A combined `pnpm turbo typecheck test:unit ...` lets turbo run those
      # tasks in parallel under one `^build` barrier; the parallel
      # @1c-odata/cli vitest runs (test:unit + test:integration:offline)
      # then race on shared global state — msw setupServer interception,
      # process.env, OS tmpdir — producing flake that ci.yml's
      # one-task-per-step structure avoids.
      - name: Typecheck (gate 1)
        run: pnpm turbo typecheck --filter='./packages/*'
      - name: Unit tests (gate 2)
        run: pnpm turbo test:unit --filter='./packages/*'
      - name: Offline integration tests (gate 3)
        run: pnpm turbo test:integration:offline --filter='./packages/*'
      - name: Build (gate 4)
        run: pnpm turbo build --filter='./packages/*'
      - name: Package lint (gate 5)
        run: pnpm turbo package:lint --filter='./packages/*'
      # TEMP DEBUG: verify GitHub secret NPM_TOKEN matches the local token
      # that works (`npm whoami` → hacker-cb, `npm publish --dry-run` OK).
      # GitHub masks the secret value in logs but not derived numbers or
      # short fragments that don't match the full secret string. Expected
      # local length: 41. Suffix check: last 4 chars of the working token.
      - name: DEBUG NPM_TOKEN integrity
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "len=${#NPM_TOKEN}"
          echo "prefix4=${NPM_TOKEN:0:4}"
          echo "suffix4=${NPM_TOKEN: -4}"
      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node@v5 with `registry-url` writes `/home/runner/work/_temp/.npmrc`
          # containing `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` and
          # sets `NPM_CONFIG_USERCONFIG` to that path. Without `NODE_AUTH_TOKEN`
          # in this step's env the placeholder stays empty when npm publishes,
          # so the registry receives an unauthed request and answers 404 (not 401)
          # for the scoped path. changesets/action's own .npmrc creation is
          # silently overridden by NPM_CONFIG_USERCONFIG — populating the
          # setup-node path is what actually works. See changesets/action#98.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # TEMP: provenance disabled for first release diagnostic — `npm
          # publish --provenance` against a fresh scope without a configured
          # Trusted Publisher returns 404 on PUT. Re-enable after 0.1.0 lands
          # and Trusted Publisher is wired up on both packages.
          # NPM_CONFIG_PROVENANCE: true
