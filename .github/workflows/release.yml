# Triggered on push to master; runs CI gates, then either opens a "Release
# packages" PR (when there are pending changesets) or publishes to npm
# (when the version PR was just merged). Auth via npm Trusted Publishing
# (OIDC) — `id-token: write` permission below + Trusted Publisher configured
# on each package in the npmjs.com UI. No `NPM_TOKEN` secret required.
name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'hacker-cb/1c-odata'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          # registry-url intentionally omitted: setup-node only uses it to
          # write a placeholder .npmrc with `_authToken=${NODE_AUTH_TOKEN}`,
          # which is the legacy NPM_TOKEN path. With Trusted Publishing the
          # OIDC token is fetched directly by `npm publish` via the
          # `id-token: write` permission — no .npmrc auth needed.
      - name: Install
        run: pnpm install --frozen-lockfile
      # CI gates split into separate turbo invocations (mirrors ci.yml).
      # A combined `pnpm turbo typecheck test:unit ...` lets turbo run those
      # tasks in parallel under one `^build` barrier; the parallel
      # @1c-odata/cli vitest runs (test:unit + test:integration:offline)
      # then race on shared global state — msw setupServer interception,
      # process.env, OS tmpdir — producing flake that ci.yml's
      # one-task-per-step structure avoids.
      - name: Typecheck (gate 1)
        run: pnpm turbo typecheck --filter='./packages/*'
      - name: Unit tests (gate 2)
        run: pnpm turbo test:unit --filter='./packages/*'
      - name: Offline integration tests (gate 3)
        run: pnpm turbo test:integration:offline --filter='./packages/*'
      - name: Build (gate 4)
        run: pnpm turbo build --filter='./packages/*'
      - name: Package lint (gate 5)
        run: pnpm turbo package:lint --filter='./packages/*'
      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1. Node 22 LTS
      # ships with npm 10.9.x, which falls back to legacy auth and fails with
      # ENEEDAUTH on `npm publish`.
      #
      # In-place self-upgrade (`npm i -g npm@latest`, even with `--force`)
      # blows up with MODULE_NOT_FOUND because the old client unlinks bundled
      # deps that its own rebuild step still requires. Install the new client
      # into a separate prefix instead and prepend it to PATH via
      # $GITHUB_PATH — the system npm stays untouched.
      - name: Install npm@latest for Trusted Publishing
        run: |
          set -euo pipefail
          npm install --prefix "$RUNNER_TEMP/npm-latest" npm@latest --no-fund --no-audit --silent
          echo "$RUNNER_TEMP/npm-latest/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Verify npm version
        run: npm --version
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      # changesets/action's `title` input is a static string evaluated before
      # `changeset version` runs, so the new version isn't yet known there.
      # Read it from the just-pushed release branch and rewrite the PR title.
      # Skipped on publish runs (no PR exists) and when there's nothing to release.
      # @1c-odata/client and @1c-odata/cli are linked in .changeset/config.json,
      # so reading the client version is sufficient.
      - name: Rewrite Release PR title with version
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail
          if [ -z "$PR_NUM" ]; then exit 0; fi
          VERSION=$(gh api "repos/${{ github.repository }}/contents/packages/client/package.json?ref=changeset-release/master" --jq '.content' | base64 -d | jq -r '.version')
          gh pr edit "$PR_NUM" --title "chore(release): v${VERSION}"
